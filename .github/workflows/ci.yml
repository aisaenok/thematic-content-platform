name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.5
          cache: pnpm

      - name: Check toolchain
        run: make doctor

      - name: Run CI checks
        run: make ci
